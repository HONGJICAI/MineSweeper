packages:
  - "packages/*"

# Single source of truth for versions of deps used by 2+ packages. Each consumer references
# these via "<dep>": "catalog:" in its package.json. Singletons (three, @threlte/*, canvas-
# confetti, archiver, etc.) stay inline since centralizing them is just indirection.
catalog:
  # vite caps at ^7 because vite-plugin-pwa@1.2.0 only peers up to vite 7. plugin-svelte ^6
  # is the matching range for vite ^6/^7. Bumping to vite 8 needs a vite-plugin-pwa release
  # that adds vite 8 to its peer list.
  "@sveltejs/vite-plugin-svelte": ^6.0.0
  "@tailwindcss/vite": ^4.1.11
  "@tauri-apps/api": ^2.11.0
  "@tauri-apps/cli": ^2.11.0
  cross-env: ^10.0.0
  rimraf: ^6.0.0
  svelte: ^5.0.0
  svelte-check: ^4.0.0
  tailwindcss: ^4
  typescript: ^5.0.0
  vite: ^7.0.0
  vite-plugin-pwa: ^1.2.0
  vitest: ^2.1.9
