name: Build Android

on:
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    # Smoke test only: produces an unsigned release AAB to verify the tauri-android pipeline
    # (gradle config + R8 + native compile) doesn't break on PRs. Signing is wired up in each
    # package's app/build.gradle.kts via a conditional read of keystore.properties; CI doesn't
    # write that file, so AGP outputs unsigned bundles. Real Play uploads are built locally.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [minesweeper, minesweeper-cube, sliding-puzzle]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android SDK + NDK
        env:
          ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk
        run: |
          sudo apt-get update && sudo apt-get install -y unzip curl
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # platforms;android-36 to match compileSdk in build.gradle.kts.
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-36" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:shared

      - name: Init Android Project
        # `tauri android init` refuses to run on a partial gen/ tree. Since we only commit
        # app/build.gradle.kts (with custom signing) and not the rest of gen/android/, fresh
        # CI checkouts hit that partial state and init bails. Wipe gen/, regenerate from
        # scratch, then restore our committed build.gradle.kts.
        run: |
          rm -rf packages/${{ matrix.package }}/src-tauri/gen
          pnpm --filter ${{ matrix.package }} run tauri:android:init
          git checkout -- packages/${{ matrix.package }}/src-tauri/gen/android/app/build.gradle.kts

      - name: Build unsigned release AAB
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
          _JAVA_OPTIONS: "-Xmx6g"
        run: pnpm --filter ${{ matrix.package }} run build:android
