name: Build Android APK

on:
  # push:
  #   branches: [ sliding_puzzle ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.0

      - name: Install dependencies
        run: pnpm install

      - name: Build shared packages
        run: pnpm build:shared

      - name: Setup Java (for Android SDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Install Android command-line tools & SDK
        env:
          ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk
          ANDROID_HOME: ${{ runner.tool_cache }}/android-sdk
        run: |
          sudo apt-get update && sudo apt-get install -y unzip curl
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Init Android Project
        run: pnpm --filter sliding-puzzle run tauri:android:init

      - name: Setup Android signing
        env:
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          ANDROID_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cd packages/sliding-puzzle/src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build Android APK
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
          _JAVA_OPTIONS: "-Xmx6g"
        run: |
          cd packages/sliding-puzzle
          pnpm run build:android

      - name: List APK outputs
        run: |
          echo "Checking for APK files:"
          find packages/sliding-puzzle/src-tauri/gen/android -name "*.apk" -type f -ls

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-android
          path: |
            packages/sliding-puzzle/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            packages/sliding-puzzle/src-tauri/gen/android/app/build/outputs/apk/release/*.apk

      - name: Clean up keystore
        if: always()
        run: |
          rm -f $RUNNER_TEMP/keystore.jks
          rm -f packages/sliding-puzzle/src-tauri/gen/android/keystore.properties
          rm -f packages/sliding-puzzle/src-tauri/gen/android/gradle.properties