name: Build Android APK

on:
  # push:
  #   branches: [ sliding_puzzle ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.0

      - name: Install dependencies
        run: pnpm install

      - name: Build shared packages
        run: |
          pnpm --filter @caiji-games/shared-* run build

      - name: Setup Java (for Android SDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Install Android command-line tools & SDK
        env:
          ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk
          ANDROID_HOME: ${{ runner.tool_cache }}/android-sdk
        run: |
          sudo apt-get update && sudo apt-get install -y unzip curl
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # Use full path to sdkmanager since PATH isn't updated yet in this shell
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"
          # Set NDK_HOME environment variable
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Init Android Project
        run: pnpm --filter sliding_puzzle run tauri:android:init
          
      - name: Build Android APK
        run: pnpm --filter sliding_puzzle run build:android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sliding-puzzle-android
          path: packages/sliding_puzzle/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk