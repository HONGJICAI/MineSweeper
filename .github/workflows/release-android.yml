name: Release Android (signed)

# Manual-only. Pick a package, get back a signed AAB (for Play upload) and APK (for sideload).
#
# Required GitHub Secrets (set under Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64     Run `base64 -w0 release-keystore.jks` locally, paste output.
#   ANDROID_KEYSTORE_PASSWORD   The keystore password you set with keytool.
#   ANDROID_KEY_PASSWORD        The key password (often same as keystore password).

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package to release'
        type: choice
        required: true
        options:
          - minesweeper
          - minesweeper-cube
          - sliding-puzzle
      build_apk:
        description: 'Also build APK (sideload-friendly, larger than per-arch). Slower.'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android SDK + NDK
        env:
          ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk
        run: |
          sudo apt-get update && sudo apt-get install -y unzip curl
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-36" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:shared

      - name: Init Android Project
        # Same partial-state dance as the smoke workflow — wipe gen/, regenerate, restore every
        # file under gen/ that we hand-edit and commit (build.gradle.kts, AndroidManifest.xml,
        # plus anything force-added later).
        run: |
          rm -rf packages/${{ inputs.package }}/src-tauri/gen
          pnpm --filter ${{ inputs.package }} run tauri:android:init
          git checkout -- $(git ls-files packages/${{ inputs.package }}/src-tauri/gen/)

      - name: Decode keystore + write keystore.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          # Fail loud if the secret is empty / wrong — gradle would otherwise emit unsigned bundles.
          test -s "$KEYSTORE_PATH" || { echo "Decoded keystore is empty — check ANDROID_KEYSTORE_BASE64 secret"; exit 1; }
          PROPS="packages/${{ inputs.package }}/src-tauri/gen/android/keystore.properties"
          {
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=caiji-release"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > "$PROPS"

      - name: Build signed release AAB
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
          _JAVA_OPTIONS: "-Xmx6g"
        run: pnpm --filter ${{ inputs.package }} run build:android

      - name: Build signed release APK (optional)
        if: inputs.build_apk
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
          _JAVA_OPTIONS: "-Xmx6g"
        run: pnpm --filter ${{ inputs.package }} run build:android:apk

      - name: Verify the AAB is actually signed
        # `apksigner` reads AABs too; if signing didn't take we want to know now, not after Play
        # Console rejects the upload. Exits non-zero if not signed.
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/34.0.0"
          AAB=$(find packages/${{ inputs.package }}/src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" | head -1)
          test -n "$AAB" || { echo "No AAB found"; exit 1; }
          echo "Found AAB: $AAB"
          # jarsigner is the right tool for AAB (apksigner is APK-only).
          jarsigner -verify -verbose "$AAB" | grep -E "jar verified|jar is unsigned" | head -3

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-android-signed
          path: |
            packages/${{ inputs.package }}/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
            packages/${{ inputs.package }}/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Cleanup keystore from runner
        if: always()
        # Best-effort. The runner is destroyed after the job anyway, but defensive cleanup in case
        # logs / cache somehow leak. The `:` swallows the rm error if the file's already gone.
        run: |
          rm -f "$RUNNER_TEMP/release-keystore.jks" || :
          rm -f packages/${{ inputs.package }}/src-tauri/gen/android/keystore.properties || :
